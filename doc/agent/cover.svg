<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1536" font-family="-apple-system, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#1a1d4e"/>
      <stop offset="100%" stop-color="#2a1f5e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1024" height="1536" fill="url(#bg)"/>
  <rect width="1024" height="1536" fill="url(#glow)"/>

  <!-- Decorative nodes - representing multi-agent network -->
  <g opacity="0.35" stroke="#7c3aed" stroke-width="1" fill="none">
    <line x1="200" y1="900" x2="400" y2="1000"/>
    <line x1="400" y1="1000" x2="600" y2="950"/>
    <line x1="600" y1="950" x2="800" y2="1050"/>
    <line x1="400" y1="1000" x2="500" y2="1150"/>
    <line x1="600" y1="950" x2="700" y2="1200"/>
    <line x1="500" y1="1150" x2="700" y2="1200"/>
    <line x1="200" y1="900" x2="350" y2="1180"/>
    <line x1="350" y1="1180" x2="500" y2="1150"/>
  </g>
  <g fill="#06b6d4" opacity="0.9">
    <circle cx="200" cy="900" r="8"/>
    <circle cx="400" cy="1000" r="10"/>
    <circle cx="600" cy="950" r="9"/>
    <circle cx="800" cy="1050" r="8"/>
    <circle cx="500" cy="1150" r="7"/>
    <circle cx="700" cy="1200" r="9"/>
    <circle cx="350" cy="1180" r="6"/>
  </g>
  <g fill="#7c3aed" opacity="0.5" filter="url(#blur)">
    <circle cx="400" cy="1000" r="20"/>
    <circle cx="600" cy="950" r="20"/>
    <circle cx="700" cy="1200" r="18"/>
  </g>

  <!-- Top accent line -->
  <rect x="80" y="160" width="100" height="4" fill="url(#accent)"/>

  <!-- Title block -->
  <text x="80" y="220" font-size="26" fill="#a5b4fc" letter-spacing="6">SERIES · 2025—2026</text>

  <text x="80" y="360" font-size="120" font-weight="800" fill="#ffffff" letter-spacing="-2">Agent</text>
  <text x="80" y="480" font-size="120" font-weight="800" fill="#ffffff" letter-spacing="-2">Engineering</text>
  <text x="80" y="600" font-size="120" font-weight="200" fill="url(#accent)" letter-spacing="-2">Compendium</text>

  <!-- Subtitle -->
  <text x="80" y="700" font-size="42" font-weight="500" fill="#e0e7ff" letter-spacing="2">从第一性原理出发的</text>
  <text x="80" y="760" font-size="42" font-weight="500" fill="#e0e7ff" letter-spacing="2">AI Agent 应用架构师指南</text>

  <!-- Stats panel -->
  <g transform="translate(80, 1300)">
    <rect x="0" y="0" width="864" height="2" fill="url(#accent)"/>
    <text x="0" y="60" font-size="80" font-weight="800" fill="#ffffff">54</text>
    <text x="0" y="100" font-size="20" fill="#a5b4fc" letter-spacing="3">DEEP ARTICLES</text>

    <text x="240" y="60" font-size="80" font-weight="800" fill="#ffffff">10</text>
    <text x="240" y="100" font-size="20" fill="#a5b4fc" letter-spacing="3">MODULES</text>

    <text x="440" y="60" font-size="80" font-weight="800" fill="#ffffff">250<tspan font-size="40">+</tspan></text>
    <text x="440" y="100" font-size="20" fill="#a5b4fc" letter-spacing="3">CITATIONS</text>

    <text x="700" y="60" font-size="80" font-weight="800" fill="#ffffff">v1.0</text>
    <text x="700" y="100" font-size="20" fill="#a5b4fc" letter-spacing="3">2026-06</text>
  </g>

  <!-- Footer -->
  <text x="80" y="1480" font-size="22" fill="#94a3b8" letter-spacing="2">
    LLM · Harness · Multi-Agent · Loop · Memory · Safety · Eval · Production · UX · Frontier
  </text>
</svg>
